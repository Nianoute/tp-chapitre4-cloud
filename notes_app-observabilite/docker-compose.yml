services:
  db:
    image: postgres:18
    container_name: notes_app_db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notes_network

  api:
    build: ./api
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./api/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notes_network

volumes:
  postgres_data:
    driver: local

networks:
  notes_network:
    driver: bridge